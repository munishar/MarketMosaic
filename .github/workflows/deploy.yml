name: Deploy

on:
  push:
    tags: ["v*"]

env:
  REGISTRY_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}
  API_IMAGE: brokerflow-api
  WEB_IMAGE: brokerflow-web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "$REGISTRY_NAME"

      - name: Build & push API image
        run: |
          docker build -f Dockerfile.api -t "$REGISTRY_NAME.azurecr.io/$API_IMAGE:${{ steps.meta.outputs.tag }}" .
          docker tag "$REGISTRY_NAME.azurecr.io/$API_IMAGE:${{ steps.meta.outputs.tag }}" "$REGISTRY_NAME.azurecr.io/$API_IMAGE:latest"
          docker push "$REGISTRY_NAME.azurecr.io/$API_IMAGE:${{ steps.meta.outputs.tag }}"
          docker push "$REGISTRY_NAME.azurecr.io/$API_IMAGE:latest"

      - name: Build & push Web image
        run: |
          docker build -f Dockerfile.web -t "$REGISTRY_NAME.azurecr.io/$WEB_IMAGE:${{ steps.meta.outputs.tag }}" .
          docker tag "$REGISTRY_NAME.azurecr.io/$WEB_IMAGE:${{ steps.meta.outputs.tag }}" "$REGISTRY_NAME.azurecr.io/$WEB_IMAGE:latest"
          docker push "$REGISTRY_NAME.azurecr.io/$WEB_IMAGE:${{ steps.meta.outputs.tag }}"
          docker push "$REGISTRY_NAME.azurecr.io/$WEB_IMAGE:latest"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_API }}
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Web to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_WEB }}
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Verify staging deployment
        run: |
          echo "Waiting for staging to stabilize..."
          sleep 30
          API_FQDN=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_API }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "API FQDN: $API_FQDN"
          curl -sf "https://$API_FQDN/health" || (echo "Staging API health check failed" && exit 1)

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_API }}
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Web to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_WEB }}
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.WEB_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Verify production deployment
        run: |
          echo "Waiting for production to stabilize..."
          sleep 30
          API_FQDN=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_API }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "API FQDN: $API_FQDN"
          curl -sf "https://$API_FQDN/health" || (echo "Production API health check failed" && exit 1)

name: E2E Tests

on:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start infrastructure
        run: docker compose up -d postgres redis
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U postgres && break
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            docker compose exec -T redis redis-cli ping && break
            sleep 2
          done

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brokerflow

      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brokerflow

      - name: Build packages
        run: npm run build

      - name: Start API server
        run: |
          cd apps/api && node dist/server.js &
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            curl -s http://localhost:3001/health && break || true
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brokerflow
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-jwt-secret-minimum-32-characters-long
          API_PORT: "3001"
          NODE_ENV: test

      - name: Start Web server
        run: |
          cd apps/web && npx vite preview --port 3000 &
          echo "Waiting for Web..."
          for i in $(seq 1 15); do
            curl -s http://localhost:3000 && break || true
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: e2e
        env:
          CI: "true"
          WEB_URL: http://localhost:3000
          API_URL: http://localhost:3001

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

      - name: Stop infrastructure
        if: always()
        run: docker compose down -v

version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: brokerflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports: ["3001:3001"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brokerflow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-jwt-secret-min-32-chars-long
      API_PORT: "3001"
      NODE_ENV: development
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports: ["3000:80"]
    depends_on: [api]
volumes:
  pgdata:
